name: mobile_user-ci

on:
  push:
    branches: [main]
    paths:
      - "mobile_user/**"
      - "shared_flutter/**"
      - ".github/workflows/mobile_user-ci.yml"
  pull_request:
    paths:
      - "mobile_user/**"
      - "shared_flutter/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_user
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.7"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release --split-per-abi
