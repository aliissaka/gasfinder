name: admin-image

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - "backend/src/GasFinder.Shared/**"
      - ".github/workflows/admin-image.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gasfinder-admin:latest
            ghcr.io/${{ github.repository_owner }}/gasfinder-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
