services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gasfinder-postgres
    environment:
      POSTGRES_USER: gasfinder
      POSTGRES_PASSWORD: gasfinder_dev
      POSTGRES_DB: gasfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gasfinder-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gasfinder
      MINIO_ROOT_PASSWORD: gasfinder_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
